<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" style="background: #ffffff; border: 2px solid #cbd5e1; border-radius: 8px; font-family: system-ui, -apple-system, sans-serif;">
  <!-- Định nghĩa lưới nền học sinh tiểu học (Grid) -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#f1f5f9" stroke-width="1" />
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e2e8f0" stroke-width="1.5" />
    </pattern>
  </defs>
  
  <!-- Lưới ô ly nền -->
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Tiêu đề debug chữ cái -->
  <text x="20" y="35" font-size="20" font-weight="bold" fill="#1e293b">Chữ: H (h)</text>
  <text x="20" y="55" font-size="12" fill="#64748b">Từ ví dụ: bông hoa 🌸</text>
  
  <!-- Trục hướng dẫn chuẩn (Chính giữa) -->
  <line x1="250" y1="0" x2="250" y2="500" stroke="#cbd5e1" stroke-dasharray="4 4" stroke-width="1" />
  <line x1="0" y1="250" x2="500" y2="250" stroke="#cbd5e1" stroke-dasharray="4 4" stroke-width="1" />

  <!-- ==================== Nét 1: Nét khuyết xuôi (h_1) ==================== -->
  <g id="stroke_h_1">
    <!-- 1. Đường hình dáng nét chữ chuẩn (độ dày thực tế, bán trong suốt) -->
    <path d="M 225 250 C 225 250 240 180 262 120 C 275 95 268 85 248 85 C 228 85 208 108 195 135 L 195 350 L 225 350 L 225 155 C 225 142 232 118 245 115 C 252 112 258 112 258 120 C 258 128 245 155 232 185 L 225 205 Z" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-opacity="0.4" stroke-width="2" />
    
    <!-- 2. Đường xương chỉ hướng (Medians Skeleton) -->
    <path d="M 210 250 L 235 180 L 260 120 L 255 100 L 235 100 L 210 130 L 210 200 L 210 270 L 210 350" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Điểm bắt đầu (đặt bút) -->
    <circle cx="210" cy="250" r="8" fill="#eab308" stroke="#1e293b" stroke-width="2" />
    <circle cx="210" cy="250" r="3" fill="#1e293b" />
    <text x="210" y="240" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">0</text>
    <!-- Điểm trung gian 1 -->
    <circle cx="235" cy="180" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="235" y="170" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">1</text>
    <!-- Điểm trung gian 2 -->
    <circle cx="260" cy="120" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="260" y="110" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">2</text>
    <!-- Điểm trung gian 3 -->
    <circle cx="255" cy="100" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="255" y="90" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">3</text>
    <!-- Điểm trung gian 4 -->
    <circle cx="235" cy="100" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="235" y="90" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">4</text>
    <!-- Điểm trung gian 5 -->
    <circle cx="210" cy="130" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="210" y="120" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">5</text>
    <!-- Điểm trung gian 6 -->
    <circle cx="210" cy="200" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="210" y="190" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">6</text>
    <!-- Điểm trung gian 7 -->
    <circle cx="210" cy="270" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="210" y="260" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">7</text>
    <!-- Điểm kết thúc (dừng bút) -->
    <circle cx="210" cy="350" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="210" y="340" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">8</text>
  </g>

  <!-- ==================== Nét 2: Nét móc hai đầu (h_2) ==================== -->
  <g id="stroke_h_2">
    <!-- 1. Đường hình dáng nét chữ chuẩn (độ dày thực tế, bán trong suốt) -->
    <path d="M 210 250 C 210 250 220 215 245 185 C 265 185 285 200 295 220 L 295 335 C 295 355 315 365 340 365 C 365 365 385 345 385 300 L 355 300 C 355 325 345 335 335 335 C 328 335 325 325 325 310 L 325 245 C 325 215 300 215 280 215 C 255 215 235 230 222 250 Z" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="2" />
    
    <!-- 2. Đường xương chỉ hướng (Medians Skeleton) -->
    <path d="M 210 250 L 235 200 L 265 200 L 290 215 L 310 250 L 310 300 L 310 340 L 335 350 L 360 325 L 370 300" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Điểm bắt đầu (đặt bút) -->
    <circle cx="210" cy="250" r="8" fill="#eab308" stroke="#1e293b" stroke-width="2" />
    <circle cx="210" cy="250" r="3" fill="#1e293b" />
    <text x="210" y="240" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">0</text>
    <!-- Điểm trung gian 1 -->
    <circle cx="235" cy="200" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="235" y="190" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">1</text>
    <!-- Điểm trung gian 2 -->
    <circle cx="265" cy="200" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="265" y="190" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">2</text>
    <!-- Điểm trung gian 3 -->
    <circle cx="290" cy="215" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="290" y="205" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">3</text>
    <!-- Điểm trung gian 4 -->
    <circle cx="310" cy="250" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="310" y="240" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">4</text>
    <!-- Điểm trung gian 5 -->
    <circle cx="310" cy="300" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="310" y="290" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">5</text>
    <!-- Điểm trung gian 6 -->
    <circle cx="310" cy="340" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="310" y="330" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">6</text>
    <!-- Điểm trung gian 7 -->
    <circle cx="335" cy="350" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="335" y="340" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">7</text>
    <!-- Điểm trung gian 8 -->
    <circle cx="360" cy="325" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="360" y="315" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">8</text>
    <!-- Điểm kết thúc (dừng bút) -->
    <circle cx="370" cy="300" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="370" y="290" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">9</text>
  </g>

  <!-- Chú thích nét vẽ (Legend) -->
  <g transform="translate(20, 440)">
    <rect width="460" height="45" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1" />
    <text x="10" y="27" font-size="12" font-weight="bold" fill="#475569">Các nét:</text>
    <g transform="translate(75, 15)">
      <circle cx="10" cy="12" r="6" fill="#ef4444" />
      <text x="22" y="16" font-size="11" fill="#475569">Nét khuyết xuôi</text>
    </g>
    <g transform="translate(200, 15)">
      <circle cx="10" cy="12" r="6" fill="#3b82f6" />
      <text x="22" y="16" font-size="11" fill="#475569">Nét móc hai đầu</text>
    </g>
  </g>
</svg>