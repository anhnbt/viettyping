<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" style="background: #ffffff; border: 2px solid #cbd5e1; border-radius: 8px; font-family: system-ui, -apple-system, sans-serif;">
  <!-- Định nghĩa lưới nền học sinh tiểu học (Grid) -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#f1f5f9" stroke-width="1" />
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e2e8f0" stroke-width="1.5" />
    </pattern>
  </defs>
  
  <!-- Lưới ô ly nền -->
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Tiêu đề debug chữ cái -->
  <text x="20" y="35" font-size="20" font-weight="bold" fill="#1e293b">Chữ: I (i)</text>
  <text x="20" y="55" font-size="12" fill="#64748b">Từ ví dụ: viên bi 🔮</text>
  
  <!-- Trục hướng dẫn chuẩn (Chính giữa) -->
  <line x1="250" y1="0" x2="250" y2="500" stroke="#cbd5e1" stroke-dasharray="4 4" stroke-width="1" />
  <line x1="0" y1="250" x2="500" y2="250" stroke="#cbd5e1" stroke-dasharray="4 4" stroke-width="1" />

  <!-- ==================== Nét 1: Nét móc ngược ngắn (i_1) ==================== -->
  <g id="stroke_i_1">
    <!-- 1. Đường hình dáng nét chữ chuẩn (độ dày thực tế, bán trong suốt) -->
    <path d="M 220 200 L 250 200 L 250 310 C 250 330 265 340 285 340 L 285 365 C 250 365 220 340 220 310 Z" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-opacity="0.4" stroke-width="2" />
    
    <!-- 2. Đường xương chỉ hướng (Medians Skeleton) -->
    <path d="M 235 200 L 235 270 L 235 320 L 260 348 L 285 353" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Điểm bắt đầu (đặt bút) -->
    <circle cx="235" cy="200" r="8" fill="#eab308" stroke="#1e293b" stroke-width="2" />
    <circle cx="235" cy="200" r="3" fill="#1e293b" />
    <text x="235" y="190" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">0</text>
    <!-- Điểm trung gian 1 -->
    <circle cx="235" cy="270" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="235" y="260" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">1</text>
    <!-- Điểm trung gian 2 -->
    <circle cx="235" cy="320" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="235" y="310" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">2</text>
    <!-- Điểm trung gian 3 -->
    <circle cx="260" cy="348" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="260" y="338" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">3</text>
    <!-- Điểm kết thúc (dừng bút) -->
    <circle cx="285" cy="353" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="285" y="343" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">4</text>
  </g>

  <!-- ==================== Nét 2: Dấu chấm (i_2) ==================== -->
  <g id="stroke_i_2">
    <!-- 1. Đường hình dáng nét chữ chuẩn (độ dày thực tế, bán trong suốt) -->
    <path d="M 225 130 C 225 120 235 110 245 110 C 255 110 265 120 265 130 C 265 140 255 150 245 150 C 235 150 225 140 225 130 Z" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="2" />
    
    <!-- 2. Đường xương chỉ hướng (Medians Skeleton) -->
    <path d="M 240 130 L 250 130" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Điểm bắt đầu (đặt bút) -->
    <circle cx="240" cy="130" r="8" fill="#eab308" stroke="#1e293b" stroke-width="2" />
    <circle cx="240" cy="130" r="3" fill="#1e293b" />
    <text x="240" y="120" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">0</text>
    <!-- Điểm kết thúc (dừng bút) -->
    <circle cx="250" cy="130" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="250" y="120" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">1</text>
  </g>

  <!-- Chú thích nét vẽ (Legend) -->
  <g transform="translate(20, 440)">
    <rect width="460" height="45" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1" />
    <text x="10" y="27" font-size="12" font-weight="bold" fill="#475569">Các nét:</text>
    <g transform="translate(75, 15)">
      <circle cx="10" cy="12" r="6" fill="#ef4444" />
      <text x="22" y="16" font-size="11" fill="#475569">Nét móc ngược ngắn</text>
    </g>
    <g transform="translate(200, 15)">
      <circle cx="10" cy="12" r="6" fill="#3b82f6" />
      <text x="22" y="16" font-size="11" fill="#475569">Dấu chấm</text>
    </g>
  </g>
</svg>