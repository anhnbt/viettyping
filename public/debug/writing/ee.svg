<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" style="background: #ffffff; border: 2px solid #cbd5e1; border-radius: 8px; font-family: system-ui, -apple-system, sans-serif;">
  <!-- Định nghĩa lưới nền học sinh tiểu học (Grid) -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#f1f5f9" stroke-width="1" />
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e2e8f0" stroke-width="1.5" />
    </pattern>
  </defs>
  
  <!-- Lưới ô ly nền -->
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Tiêu đề debug chữ cái -->
  <text x="20" y="35" font-size="20" font-weight="bold" fill="#1e293b">Chữ: Ê (ê)</text>
  <text x="20" y="55" font-size="12" fill="#64748b">Từ ví dụ: con ếch 🐸</text>
  
  <!-- Trục hướng dẫn chuẩn (Chính giữa) -->
  <line x1="250" y1="0" x2="250" y2="500" stroke="#cbd5e1" stroke-dasharray="4 4" stroke-width="1" />
  <line x1="0" y1="250" x2="500" y2="250" stroke="#cbd5e1" stroke-dasharray="4 4" stroke-width="1" />

  <!-- ==================== Nét 1: Nét cong thắt (ee_1) ==================== -->
  <g id="stroke_ee_1">
    <!-- 1. Đường hình dáng nét chữ chuẩn (độ dày thực tế, bán trong suốt) -->
    <path d="M 190 300 C 190 300 320 300 320 280 C 320 240 280 190 230 190 C 170 190 130 235 130 285 C 130 335 170 375 240 375 C 290 375 325 350 345 330 L 365 345 C 340 375 295 400 240 400 C 150 400 100 350 100 285 C 100 215 155 165 240 165 C 310 165 350 215 350 275 C 350 320 260 325 190 325 Z M 230 215 C 265 215 290 240 295 270 L 165 270 C 170 240 195 215 230 215 Z" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-opacity="0.4" stroke-width="2" />
    
    <!-- 2. Đường xương chỉ hướng (Medians Skeleton) -->
    <path d="M 160 290 L 220 285 L 280 280 L 310 260 L 300 220 L 260 195 L 200 200 L 150 240 L 135 290 L 155 340 L 210 370 L 270 370 L 325 340" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Điểm bắt đầu (đặt bút) -->
    <circle cx="160" cy="290" r="8" fill="#eab308" stroke="#1e293b" stroke-width="2" />
    <circle cx="160" cy="290" r="3" fill="#1e293b" />
    <text x="160" y="280" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">0</text>
    <!-- Điểm trung gian 1 -->
    <circle cx="220" cy="285" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="220" y="275" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">1</text>
    <!-- Điểm trung gian 2 -->
    <circle cx="280" cy="280" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="280" y="270" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">2</text>
    <!-- Điểm trung gian 3 -->
    <circle cx="310" cy="260" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="310" y="250" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">3</text>
    <!-- Điểm trung gian 4 -->
    <circle cx="300" cy="220" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="300" y="210" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">4</text>
    <!-- Điểm trung gian 5 -->
    <circle cx="260" cy="195" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="260" y="185" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">5</text>
    <!-- Điểm trung gian 6 -->
    <circle cx="200" cy="200" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="200" y="190" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">6</text>
    <!-- Điểm trung gian 7 -->
    <circle cx="150" cy="240" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="150" y="230" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">7</text>
    <!-- Điểm trung gian 8 -->
    <circle cx="135" cy="290" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="135" y="280" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">8</text>
    <!-- Điểm trung gian 9 -->
    <circle cx="155" cy="340" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="155" y="330" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">9</text>
    <!-- Điểm trung gian 10 -->
    <circle cx="210" cy="370" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="210" y="360" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">10</text>
    <!-- Điểm trung gian 11 -->
    <circle cx="270" cy="370" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="270" y="360" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">11</text>
    <!-- Điểm kết thúc (dừng bút) -->
    <circle cx="325" cy="340" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="325" y="330" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">12</text>
  </g>

  <!-- ==================== Nét 2: Nét xiên trái của nón (ee_2) ==================== -->
  <g id="stroke_ee_2">
    <!-- 1. Đường hình dáng nét chữ chuẩn (độ dày thực tế, bán trong suốt) -->
    <path d="M 185 140 L 240 100 L 255 115 L 200 155 Z" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="2" />
    
    <!-- 2. Đường xương chỉ hướng (Medians Skeleton) -->
    <path d="M 190 140 L 215 120 L 240 105" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Điểm bắt đầu (đặt bút) -->
    <circle cx="190" cy="140" r="8" fill="#eab308" stroke="#1e293b" stroke-width="2" />
    <circle cx="190" cy="140" r="3" fill="#1e293b" />
    <text x="190" y="130" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">0</text>
    <!-- Điểm trung gian 1 -->
    <circle cx="215" cy="120" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="215" y="110" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">1</text>
    <!-- Điểm kết thúc (dừng bút) -->
    <circle cx="240" cy="105" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="240" y="95" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">2</text>
  </g>

  <!-- ==================== Nét 3: Nét xiên phải của nón (ee_3) ==================== -->
  <g id="stroke_ee_3">
    <!-- 1. Đường hình dáng nét chữ chuẩn (độ dày thực tế, bán trong suốt) -->
    <path d="M 240 100 L 295 140 L 280 155 L 225 115 Z" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-opacity="0.4" stroke-width="2" />
    
    <!-- 2. Đường xương chỉ hướng (Medians Skeleton) -->
    <path d="M 240 105 L 265 120 L 290 140" fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Điểm bắt đầu (đặt bút) -->
    <circle cx="240" cy="105" r="8" fill="#eab308" stroke="#1e293b" stroke-width="2" />
    <circle cx="240" cy="105" r="3" fill="#1e293b" />
    <text x="240" y="95" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">0</text>
    <!-- Điểm trung gian 1 -->
    <circle cx="265" cy="120" r="5" fill="#10b981" stroke="#ffffff" stroke-width="1.5" />
    <text x="265" y="110" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">1</text>
    <!-- Điểm kết thúc (dừng bút) -->
    <circle cx="290" cy="140" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="290" y="130" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">2</text>
  </g>

  <!-- Chú thích nét vẽ (Legend) -->
  <g transform="translate(20, 440)">
    <rect width="460" height="45" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1" />
    <text x="10" y="27" font-size="12" font-weight="bold" fill="#475569">Các nét:</text>
    <g transform="translate(75, 15)">
      <circle cx="10" cy="12" r="6" fill="#ef4444" />
      <text x="22" y="16" font-size="11" fill="#475569">Nét cong thắt</text>
    </g>
    <g transform="translate(200, 15)">
      <circle cx="10" cy="12" r="6" fill="#3b82f6" />
      <text x="22" y="16" font-size="11" fill="#475569">Nét xiên trái củ..</text>
    </g>
    <g transform="translate(325, 15)">
      <circle cx="10" cy="12" r="6" fill="#10b981" />
      <text x="22" y="16" font-size="11" fill="#475569">Nét xiên phải củ..</text>
    </g>
  </g>
</svg>