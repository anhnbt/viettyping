<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" style="background: #ffffff; border: 2px solid #cbd5e1; border-radius: 8px; font-family: system-ui, -apple-system, sans-serif;">
  <!-- Định nghĩa lưới nền học sinh tiểu học (Grid) -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#f1f5f9" stroke-width="1" />
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e2e8f0" stroke-width="1.5" />
    </pattern>
  </defs>
  
  <!-- Lưới ô ly nền -->
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Tiêu đề debug chữ cái -->
  <text x="20" y="35" font-size="20" font-weight="bold" fill="#1e293b">Chữ: C (c)</text>
  <text x="20" y="55" font-size="12" fill="#64748b">Từ ví dụ: con cá 🐟</text>
  
  <!-- Trục hướng dẫn chuẩn (Chính giữa) -->
  <line x1="250" y1="0" x2="250" y2="500" stroke="#cbd5e1" stroke-dasharray="4 4" stroke-width="1" />
  <line x1="0" y1="250" x2="500" y2="250" stroke="#cbd5e1" stroke-dasharray="4 4" stroke-width="1" />

  <!-- ==================== Nét 1: Nét cong hở phải (c_1) ==================== -->
  <g id="stroke_c_1">
    <!-- 1. Đường hình dáng nét chữ chuẩn (độ dày thực tế, bán trong suốt) -->
    <path d="M 350 210 C 330 190 300 170 260 170 C 180 170 140 210 140 260 C 140 310 180 350 260 350 C 300 350 330 330 350 310 L 370 325 C 345 355 305 375 260 375 C 160 375 110 325 110 260 C 110 195 160 145 260 145 C 305 145 345 165 370 195 Z" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-opacity="0.4" stroke-width="2" />
    
    <!-- 2. Đường xương chỉ hướng (Medians Skeleton) -->
    <path d="M 360 202 L 310 165 L 255 158 L 190 185 L 125 260 L 190 335 L 255 362 L 310 355 L 360 318" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Điểm bắt đầu (đặt bút) -->
    <circle cx="360" cy="202" r="8" fill="#eab308" stroke="#1e293b" stroke-width="2" />
    <circle cx="360" cy="202" r="3" fill="#1e293b" />
    <text x="360" y="192" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">0</text>
    <!-- Điểm trung gian 1 -->
    <circle cx="310" cy="165" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="310" y="155" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">1</text>
    <!-- Điểm trung gian 2 -->
    <circle cx="255" cy="158" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="255" y="148" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">2</text>
    <!-- Điểm trung gian 3 -->
    <circle cx="190" cy="185" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="190" y="175" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">3</text>
    <!-- Điểm trung gian 4 -->
    <circle cx="125" cy="260" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="125" y="250" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">4</text>
    <!-- Điểm trung gian 5 -->
    <circle cx="190" cy="335" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="190" y="325" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">5</text>
    <!-- Điểm trung gian 6 -->
    <circle cx="255" cy="362" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="255" y="352" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">6</text>
    <!-- Điểm trung gian 7 -->
    <circle cx="310" cy="355" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="310" y="345" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">7</text>
    <!-- Điểm kết thúc (dừng bút) -->
    <circle cx="360" cy="318" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="360" y="308" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">8</text>
  </g>

  <!-- Chú thích nét vẽ (Legend) -->
  <g transform="translate(20, 440)">
    <rect width="460" height="45" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1" />
    <text x="10" y="27" font-size="12" font-weight="bold" fill="#475569">Các nét:</text>
    <g transform="translate(75, 15)">
      <circle cx="10" cy="12" r="6" fill="#ef4444" />
      <text x="22" y="16" font-size="11" fill="#475569">Nét cong hở phải</text>
    </g>
  </g>
</svg>