<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" style="background: #ffffff; border: 2px solid #cbd5e1; border-radius: 8px; font-family: system-ui, -apple-system, sans-serif;">
  <!-- Định nghĩa lưới nền học sinh tiểu học (Grid) -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#f1f5f9" stroke-width="1" />
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e2e8f0" stroke-width="1.5" />
    </pattern>
  </defs>
  
  <!-- Lưới ô ly nền -->
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Tiêu đề debug chữ cái -->
  <text x="20" y="35" font-size="20" font-weight="bold" fill="#1e293b">Chữ: U (u)</text>
  <text x="20" y="55" font-size="12" fill="#64748b">Từ ví dụ: cái mũ 👒</text>
  
  <!-- Trục hướng dẫn chuẩn (Chính giữa) -->
  <line x1="250" y1="0" x2="250" y2="500" stroke="#cbd5e1" stroke-dasharray="4 4" stroke-width="1" />
  <line x1="0" y1="250" x2="500" y2="250" stroke="#cbd5e1" stroke-dasharray="4 4" stroke-width="1" />

  <!-- ==================== Nét 1: Nét móc ngược 1 (u_1) ==================== -->
  <g id="stroke_u_1">
    <!-- 1. Đường hình dáng nét chữ chuẩn (độ dày thực tế, bán trong suốt) -->
    <path d="M 180 200 L 210 200 L 210 310 C 210 330 230 340 255 340 C 280 340 300 330 300 310 L 300 200 L 330 200 L 330 310 C 330 350 300 370 255 370 C 210 370 180 350 180 310 Z" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-opacity="0.4" stroke-width="2" />
    
    <!-- 2. Đường xương chỉ hướng (Medians Skeleton) -->
    <path d="M 195 200 L 195 270 L 195 320 L 215 345 L 255 355 L 295 345 L 315 320 L 315 260 L 315 200" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Điểm bắt đầu (đặt bút) -->
    <circle cx="195" cy="200" r="8" fill="#eab308" stroke="#1e293b" stroke-width="2" />
    <circle cx="195" cy="200" r="3" fill="#1e293b" />
    <text x="195" y="190" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">0</text>
    <!-- Điểm trung gian 1 -->
    <circle cx="195" cy="270" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="195" y="260" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">1</text>
    <!-- Điểm trung gian 2 -->
    <circle cx="195" cy="320" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="195" y="310" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">2</text>
    <!-- Điểm trung gian 3 -->
    <circle cx="215" cy="345" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="215" y="335" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">3</text>
    <!-- Điểm trung gian 4 -->
    <circle cx="255" cy="355" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="255" y="345" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">4</text>
    <!-- Điểm trung gian 5 -->
    <circle cx="295" cy="345" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="295" y="335" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">5</text>
    <!-- Điểm trung gian 6 -->
    <circle cx="315" cy="320" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="315" y="310" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">6</text>
    <!-- Điểm trung gian 7 -->
    <circle cx="315" cy="260" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="315" y="250" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">7</text>
    <!-- Điểm kết thúc (dừng bút) -->
    <circle cx="315" cy="200" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="315" y="190" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">8</text>
  </g>

  <!-- ==================== Nét 2: Nét móc ngược 2 (u_2) ==================== -->
  <g id="stroke_u_2">
    <!-- 1. Đường hình dáng nét chữ chuẩn (độ dày thực tế, bán trong suốt) -->
    <path d="M 300 200 L 330 200 L 330 310 C 330 330 345 340 365 340 L 365 365 C 330 365 300 340 300 310 Z" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="2" />
    
    <!-- 2. Đường xương chỉ hướng (Medians Skeleton) -->
    <path d="M 315 200 L 315 270 L 315 325 L 340 350 L 365 353" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Điểm bắt đầu (đặt bút) -->
    <circle cx="315" cy="200" r="8" fill="#eab308" stroke="#1e293b" stroke-width="2" />
    <circle cx="315" cy="200" r="3" fill="#1e293b" />
    <text x="315" y="190" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">0</text>
    <!-- Điểm trung gian 1 -->
    <circle cx="315" cy="270" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="315" y="260" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">1</text>
    <!-- Điểm trung gian 2 -->
    <circle cx="315" cy="325" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="315" y="315" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">2</text>
    <!-- Điểm trung gian 3 -->
    <circle cx="340" cy="350" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="340" y="340" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">3</text>
    <!-- Điểm kết thúc (dừng bút) -->
    <circle cx="365" cy="353" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="365" y="343" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">4</text>
  </g>

  <!-- Chú thích nét vẽ (Legend) -->
  <g transform="translate(20, 440)">
    <rect width="460" height="45" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1" />
    <text x="10" y="27" font-size="12" font-weight="bold" fill="#475569">Các nét:</text>
    <g transform="translate(75, 15)">
      <circle cx="10" cy="12" r="6" fill="#ef4444" />
      <text x="22" y="16" font-size="11" fill="#475569">Nét móc ngược 1</text>
    </g>
    <g transform="translate(200, 15)">
      <circle cx="10" cy="12" r="6" fill="#3b82f6" />
      <text x="22" y="16" font-size="11" fill="#475569">Nét móc ngược 2</text>
    </g>
  </g>
</svg>