<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" style="background: #ffffff; border: 2px solid #cbd5e1; border-radius: 8px; font-family: system-ui, -apple-system, sans-serif;">
  <!-- Định nghĩa lưới nền học sinh tiểu học (Grid) -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#f1f5f9" stroke-width="1" />
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e2e8f0" stroke-width="1.5" />
    </pattern>
  </defs>
  
  <!-- Lưới ô ly nền -->
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Tiêu đề debug chữ cái -->
  <text x="20" y="35" font-size="20" font-weight="bold" fill="#1e293b">Chữ: Â (â)</text>
  <text x="20" y="55" font-size="12" fill="#64748b">Từ ví dụ: cái cân ⚖️</text>
  
  <!-- Trục hướng dẫn chuẩn (Chính giữa) -->
  <line x1="250" y1="0" x2="250" y2="500" stroke="#cbd5e1" stroke-dasharray="4 4" stroke-width="1" />
  <line x1="0" y1="250" x2="500" y2="250" stroke="#cbd5e1" stroke-dasharray="4 4" stroke-width="1" />

  <!-- ==================== Nét 1: Nét cong kín (aa_1) ==================== -->
  <g id="stroke_aa_1">
    <!-- 1. Đường hình dáng nét chữ chuẩn (độ dày thực tế, bán trong suốt) -->
    <path d="M 260 190 C 180 190 140 230 140 280 C 140 330 180 370 260 370 C 340 370 380 330 380 280 C 380 230 340 190 260 190 Z M 260 220 C 310 220 340 240 340 280 C 340 320 310 340 260 340 C 210 340 180 320 180 280 C 180 240 210 220 260 220 Z" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-opacity="0.4" stroke-width="2" />
    
    <!-- 2. Đường xương chỉ hướng (Medians Skeleton) -->
    <path d="M 320 210 L 260 195 L 180 220 L 150 280 L 180 340 L 260 365 L 330 340 L 350 280 L 320 210" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Điểm bắt đầu (đặt bút) -->
    <circle cx="320" cy="210" r="8" fill="#eab308" stroke="#1e293b" stroke-width="2" />
    <circle cx="320" cy="210" r="3" fill="#1e293b" />
    <text x="320" y="200" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">0</text>
    <!-- Điểm trung gian 1 -->
    <circle cx="260" cy="195" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="260" y="185" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">1</text>
    <!-- Điểm trung gian 2 -->
    <circle cx="180" cy="220" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="180" y="210" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">2</text>
    <!-- Điểm trung gian 3 -->
    <circle cx="150" cy="280" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="150" y="270" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">3</text>
    <!-- Điểm trung gian 4 -->
    <circle cx="180" cy="340" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="180" y="330" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">4</text>
    <!-- Điểm trung gian 5 -->
    <circle cx="260" cy="365" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="260" y="355" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">5</text>
    <!-- Điểm trung gian 6 -->
    <circle cx="330" cy="340" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="330" y="330" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">6</text>
    <!-- Điểm trung gian 7 -->
    <circle cx="350" cy="280" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="350" y="270" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">7</text>
    <!-- Điểm kết thúc (dừng bút) -->
    <circle cx="320" cy="210" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="320" y="200" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">8</text>
  </g>

  <!-- ==================== Nét 2: Nét móc ngược phải (aa_2) ==================== -->
  <g id="stroke_aa_2">
    <!-- 1. Đường hình dáng nét chữ chuẩn (độ dày thực tế, bán trong suốt) -->
    <path d="M 350 190 L 380 190 L 380 330 C 380 350 395 360 415 360 L 415 385 C 380 385 350 360 350 330 Z" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="2" />
    
    <!-- 2. Đường xương chỉ hướng (Medians Skeleton) -->
    <path d="M 365 190 L 365 280 L 365 340 L 390 365 L 415 365" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Điểm bắt đầu (đặt bút) -->
    <circle cx="365" cy="190" r="8" fill="#eab308" stroke="#1e293b" stroke-width="2" />
    <circle cx="365" cy="190" r="3" fill="#1e293b" />
    <text x="365" y="180" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">0</text>
    <!-- Điểm trung gian 1 -->
    <circle cx="365" cy="280" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="365" y="270" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">1</text>
    <!-- Điểm trung gian 2 -->
    <circle cx="365" cy="340" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="365" y="330" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">2</text>
    <!-- Điểm trung gian 3 -->
    <circle cx="390" cy="365" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="390" y="355" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">3</text>
    <!-- Điểm kết thúc (dừng bút) -->
    <circle cx="415" cy="365" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="415" y="355" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">4</text>
  </g>

  <!-- ==================== Nét 3: Nét xiên trái của nón (aa_3) ==================== -->
  <g id="stroke_aa_3">
    <!-- 1. Đường hình dáng nét chữ chuẩn (độ dày thực tế, bán trong suốt) -->
    <path d="M 195 160 L 250 120 L 265 135 L 210 175 Z" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-opacity="0.4" stroke-width="2" />
    
    <!-- 2. Đường xương chỉ hướng (Medians Skeleton) -->
    <path d="M 200 160 L 225 140 L 250 125" fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Điểm bắt đầu (đặt bút) -->
    <circle cx="200" cy="160" r="8" fill="#eab308" stroke="#1e293b" stroke-width="2" />
    <circle cx="200" cy="160" r="3" fill="#1e293b" />
    <text x="200" y="150" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">0</text>
    <!-- Điểm trung gian 1 -->
    <circle cx="225" cy="140" r="5" fill="#10b981" stroke="#ffffff" stroke-width="1.5" />
    <text x="225" y="130" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">1</text>
    <!-- Điểm kết thúc (dừng bút) -->
    <circle cx="250" cy="125" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="250" y="115" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">2</text>
  </g>

  <!-- ==================== Nét 4: Nét xiên phải của nón (aa_4) ==================== -->
  <g id="stroke_aa_4">
    <!-- 1. Đường hình dáng nét chữ chuẩn (độ dày thực tế, bán trong suốt) -->
    <path d="M 250 120 L 305 160 L 290 175 L 235 135 Z" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="2" />
    
    <!-- 2. Đường xương chỉ hướng (Medians Skeleton) -->
    <path d="M 250 125 L 275 140 L 300 160" fill="none" stroke="#f59e0b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Điểm bắt đầu (đặt bút) -->
    <circle cx="250" cy="125" r="8" fill="#eab308" stroke="#1e293b" stroke-width="2" />
    <circle cx="250" cy="125" r="3" fill="#1e293b" />
    <text x="250" y="115" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">0</text>
    <!-- Điểm trung gian 1 -->
    <circle cx="275" cy="140" r="5" fill="#f59e0b" stroke="#ffffff" stroke-width="1.5" />
    <text x="275" y="130" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">1</text>
    <!-- Điểm kết thúc (dừng bút) -->
    <circle cx="300" cy="160" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="300" y="150" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">2</text>
  </g>

  <!-- Chú thích nét vẽ (Legend) -->
  <g transform="translate(20, 440)">
    <rect width="460" height="45" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1" />
    <text x="10" y="27" font-size="12" font-weight="bold" fill="#475569">Các nét:</text>
    <g transform="translate(75, 15)">
      <circle cx="10" cy="12" r="6" fill="#ef4444" />
      <text x="22" y="16" font-size="11" fill="#475569">Nét cong kín</text>
    </g>
    <g transform="translate(200, 15)">
      <circle cx="10" cy="12" r="6" fill="#3b82f6" />
      <text x="22" y="16" font-size="11" fill="#475569">Nét móc ngược phải</text>
    </g>
    <g transform="translate(325, 15)">
      <circle cx="10" cy="12" r="6" fill="#10b981" />
      <text x="22" y="16" font-size="11" fill="#475569">Nét xiên trái củ..</text>
    </g>
    <g transform="translate(450, 15)">
      <circle cx="10" cy="12" r="6" fill="#f59e0b" />
      <text x="22" y="16" font-size="11" fill="#475569">Nét xiên phải củ..</text>
    </g>
  </g>
</svg>