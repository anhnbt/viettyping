<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" style="background: #ffffff; border: 2px solid #cbd5e1; border-radius: 8px; font-family: system-ui, -apple-system, sans-serif;">
  <!-- Định nghĩa lưới nền học sinh tiểu học (Grid) -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#f1f5f9" stroke-width="1" />
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#e2e8f0" stroke-width="1.5" />
    </pattern>
  </defs>
  
  <!-- Lưới ô ly nền -->
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Tiêu đề debug chữ cái -->
  <text x="20" y="35" font-size="20" font-weight="bold" fill="#1e293b">Chữ: Đ (đ)</text>
  <text x="20" y="55" font-size="12" fill="#64748b">Từ ví dụ: quả đu đủ 🥭</text>
  
  <!-- Trục hướng dẫn chuẩn (Chính giữa) -->
  <line x1="250" y1="0" x2="250" y2="500" stroke="#cbd5e1" stroke-dasharray="4 4" stroke-width="1" />
  <line x1="0" y1="250" x2="500" y2="250" stroke="#cbd5e1" stroke-dasharray="4 4" stroke-width="1" />

  <!-- ==================== Nét 1: Nét cong kín (dd_1) ==================== -->
  <g id="stroke_dd_1">
    <!-- 1. Đường hình dáng nét chữ chuẩn (độ dày thực tế, bán trong suốt) -->
    <path d="M 240 190 C 170 190 130 230 130 280 C 130 330 170 370 240 370 C 310 370 350 330 350 280 C 350 230 310 190 240 190 Z M 240 220 C 285 220 315 240 315 280 C 315 320 285 340 240 340 C 195 340 165 320 165 280 C 165 240 195 220 240 220 Z" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-opacity="0.4" stroke-width="2" />
    
    <!-- 2. Đường xương chỉ hướng (Medians Skeleton) -->
    <path d="M 300 210 L 240 195 L 170 220 L 145 280 L 170 340 L 240 365 L 300 340 L 320 280 L 300 210" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Điểm bắt đầu (đặt bút) -->
    <circle cx="300" cy="210" r="8" fill="#eab308" stroke="#1e293b" stroke-width="2" />
    <circle cx="300" cy="210" r="3" fill="#1e293b" />
    <text x="300" y="200" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">0</text>
    <!-- Điểm trung gian 1 -->
    <circle cx="240" cy="195" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="240" y="185" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">1</text>
    <!-- Điểm trung gian 2 -->
    <circle cx="170" cy="220" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="170" y="210" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">2</text>
    <!-- Điểm trung gian 3 -->
    <circle cx="145" cy="280" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="145" y="270" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">3</text>
    <!-- Điểm trung gian 4 -->
    <circle cx="170" cy="340" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="170" y="330" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">4</text>
    <!-- Điểm trung gian 5 -->
    <circle cx="240" cy="365" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="240" y="355" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">5</text>
    <!-- Điểm trung gian 6 -->
    <circle cx="300" cy="340" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="300" y="330" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">6</text>
    <!-- Điểm trung gian 7 -->
    <circle cx="320" cy="280" r="5" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="320" y="270" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">7</text>
    <!-- Điểm kết thúc (dừng bút) -->
    <circle cx="300" cy="210" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="300" y="200" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">8</text>
  </g>

  <!-- ==================== Nét 2: Nét móc ngược dài (dd_2) ==================== -->
  <g id="stroke_dd_2">
    <!-- 1. Đường hình dáng nét chữ chuẩn (độ dày thực tế, bán trong suốt) -->
    <path d="M 320 100 L 350 100 L 350 330 C 350 350 365 360 385 360 L 385 385 C 350 385 320 360 320 330 Z" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="2" />
    
    <!-- 2. Đường xương chỉ hướng (Medians Skeleton) -->
    <path d="M 335 100 L 335 220 L 335 330 L 360 360 L 385 360" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Điểm bắt đầu (đặt bút) -->
    <circle cx="335" cy="100" r="8" fill="#eab308" stroke="#1e293b" stroke-width="2" />
    <circle cx="335" cy="100" r="3" fill="#1e293b" />
    <text x="335" y="90" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">0</text>
    <!-- Điểm trung gian 1 -->
    <circle cx="335" cy="220" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="335" y="210" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">1</text>
    <!-- Điểm trung gian 2 -->
    <circle cx="335" cy="330" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="335" y="320" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">2</text>
    <!-- Điểm trung gian 3 -->
    <circle cx="360" cy="360" r="5" fill="#3b82f6" stroke="#ffffff" stroke-width="1.5" />
    <text x="360" y="350" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">3</text>
    <!-- Điểm kết thúc (dừng bút) -->
    <circle cx="385" cy="360" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="385" y="350" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">4</text>
  </g>

  <!-- ==================== Nét 3: Nét gạch ngang (dd_3) ==================== -->
  <g id="stroke_dd_3">
    <!-- 1. Đường hình dáng nét chữ chuẩn (độ dày thực tế, bán trong suốt) -->
    <path d="M 290 140 L 380 140 L 380 165 L 290 165 Z" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-opacity="0.4" stroke-width="2" />
    
    <!-- 2. Đường xương chỉ hướng (Medians Skeleton) -->
    <path d="M 295 152 L 335 152 L 375 152" fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Điểm bắt đầu (đặt bút) -->
    <circle cx="295" cy="152" r="8" fill="#eab308" stroke="#1e293b" stroke-width="2" />
    <circle cx="295" cy="152" r="3" fill="#1e293b" />
    <text x="295" y="142" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">0</text>
    <!-- Điểm trung gian 1 -->
    <circle cx="335" cy="152" r="5" fill="#10b981" stroke="#ffffff" stroke-width="1.5" />
    <text x="335" y="142" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">1</text>
    <!-- Điểm kết thúc (dừng bút) -->
    <circle cx="375" cy="152" r="6" fill="#ef4444" stroke="#ffffff" stroke-width="1.5" />
    <text x="375" y="142" font-size="11" font-weight="bold" fill="#1e293b" text-anchor="middle" style="paint-order: stroke; stroke: #ffffff; stroke-width: 3px; stroke-linejoin: round;">2</text>
  </g>

  <!-- Chú thích nét vẽ (Legend) -->
  <g transform="translate(20, 440)">
    <rect width="460" height="45" fill="#f8fafc" rx="6" stroke="#e2e8f0" stroke-width="1" />
    <text x="10" y="27" font-size="12" font-weight="bold" fill="#475569">Các nét:</text>
    <g transform="translate(75, 15)">
      <circle cx="10" cy="12" r="6" fill="#ef4444" />
      <text x="22" y="16" font-size="11" fill="#475569">Nét cong kín</text>
    </g>
    <g transform="translate(200, 15)">
      <circle cx="10" cy="12" r="6" fill="#3b82f6" />
      <text x="22" y="16" font-size="11" fill="#475569">Nét móc ngược dài</text>
    </g>
    <g transform="translate(325, 15)">
      <circle cx="10" cy="12" r="6" fill="#10b981" />
      <text x="22" y="16" font-size="11" fill="#475569">Nét gạch ngang</text>
    </g>
  </g>
</svg>